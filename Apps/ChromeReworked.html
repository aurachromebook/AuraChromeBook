<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Chrome</title>
    <script src="https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@2.0.0/dist/uv.bundle.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #202124;
            color: #e8eaed;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .browser-header {
            background: #303134;
            padding: 8px 16px;
            border-bottom: 1px solid #5f6368;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-buttons {
            display: flex;
            gap: 4px;
        }

        .nav-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            background: #303134;
            color: #e8eaed;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: background 0.2s;
        }

        .nav-btn:hover {
            background: #5f6368;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .address-bar {
            flex: 1;
            display: flex;
            align-items: center;
            background: #303134;
            border-radius: 24px;
            padding: 0 16px;
            height: 32px;
            border: 1px solid #5f6368;
        }

        .address-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e8eaed;
            font-size: 14px;
            outline: none;
        }

        .address-input::placeholder {
            color: #9aa0a6;
        }

        .go-btn {
            background: transparent;
            border: none;
            color: #e8eaed;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
        }

        .go-btn:hover {
            background: #5f6368;
        }

        .bookmarks {
            display: flex;
            gap: 8px;
            padding: 8px 16px;
            border-bottom: 1px solid #5f6368;
        }

        .bookmark {
            padding: 4px 12px;
            background: #303134;
            color: #e8eaed;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }

        .bookmark:hover {
            background: #5f6368;
        }

        .browser-content {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #ffffff;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #e8eaed;
            font-size: 18px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #5f6368;
            border-top: 3px solid #8ab4f8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="browser-header">
        <div class="nav-buttons">
            <button class="nav-btn" id="back-btn" title="Back">←</button>
            <button class="nav-btn" id="forward-btn" title="Forward">→</button>
            <button class="nav-btn" id="refresh-btn" title="Refresh">↻</button>
        </div>
        <div class="address-bar">
            <input type="text" class="address-input" id="address-input" placeholder="Search or enter URL" value="https://www.google.com">
            <button class="go-btn" id="go-btn">🔍</button>
        </div>
    </div>

    <div class="bookmarks">
        <button class="bookmark" onclick="navigate('https://www.google.com')">Google</button>
        <button class="bookmark" onclick="navigate('https://www.youtube.com')">YouTube</button>
        <button class="bookmark" onclick="navigate('https://www.github.com')">GitHub</button>
        <button class="bookmark" onclick="navigate('https://www.reddit.com')">Reddit</button>
        <button class="bookmark" onclick="navigate('https://www.discord.com')">Discord</button>
    </div>

    <div class="browser-content">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>
        <iframe id="browser-frame" style="display: none;"></iframe>
    </div>

    <script>
        // Configure UV Proxy from CDN
        window.__uv$config = {
            prefix: '/uv/',
            bare: 'https://bare-server-1.onrender.com/',
            encodeUrl: Ultraviolet.codec.xor.encode,
            decodeUrl: Ultraviolet.codec.xor.decode,
            handler: 'https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@2.0.0/dist/uv.handler.js',
            client: 'https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@2.0.0/dist/uv.client.js',
            bundle: 'https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@2.0.0/dist/uv.bundle.js',
            config: 'https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@2.0.0/dist/uv.config.js',
            sw: 'https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@2.0.0/dist/uv.sw.js',
        };

        const addressInput = document.getElementById('address-input');
        const goBtn = document.getElementById('go-btn');
        const backBtn = document.getElementById('back-btn');
        const forwardBtn = document.getElementById('forward-btn');
        const refreshBtn = document.getElementById('refresh-btn');
        const browserFrame = document.getElementById('browser-frame');
        const loading = document.getElementById('loading');

        let history = [];
        let currentIndex = -1;

        function encodeURL(url) {
            try {
                // Use UV's encoding to create proxied URL
                const encoded = Ultraviolet.codec.xor.encode(url);
                return '/uv/service/' + encoded;
            } catch (e) {
                console.error('Encoding error:', e);
                return url;
            }
        }

        function navigate(url) {
            if (!url) return;

            // Add protocol if missing
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                if (url.includes('.') && !url.includes(' ')) {
                    url = 'https://' + url;
                } else {
                    url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
                }
            }

            loading.style.display = 'flex';
            browserFrame.style.display = 'none';

            try {
                // Use UV to create the proxied URL
                const encodedUrl = encodeURL(url);
                browserFrame.src = encodedUrl;

                // Update history
                if (currentIndex < history.length - 1) {
                    history = history.slice(0, currentIndex + 1);
                }
                history.push(url);
                currentIndex = history.length - 1;

                addressInput.value = url;
                updateNavButtons();
            } catch (e) {
                console.error('Navigation error:', e);
                loading.innerHTML = '<p style="color: #ea4335;">Error loading page</p>';
            }
        }

        function updateNavButtons() {
            backBtn.disabled = currentIndex <= 0;
            forwardBtn.disabled = currentIndex >= history.length - 1;
        }

        function goBack() {
            if (currentIndex > 0) {
                currentIndex--;
                navigate(history[currentIndex]);
            }
        }

        function goForward() {
            if (currentIndex < history.length - 1) {
                currentIndex++;
                navigate(history[currentIndex]);
            }
        }

        function refresh() {
            if (history[currentIndex]) {
                const url = history[currentIndex];
                loading.style.display = 'flex';
                navigate(url);
            }
        }

        // Event listeners
        goBtn.addEventListener('click', () => navigate(addressInput.value));
        addressInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                navigate(addressInput.value);
            }
        });

        backBtn.addEventListener('click', goBack);
        forwardBtn.addEventListener('click', goForward);
        refreshBtn.addEventListener('click', refresh);

        browserFrame.addEventListener('load', () => {
            loading.style.display = 'none';
            browserFrame.style.display = 'block';
        });

        browserFrame.addEventListener('error', () => {
            loading.innerHTML = '<p style="color: #ea4335;">Failed to load page</p>';
        });

        // Register Service Worker for UV
        window.addEventListener('load', () => {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register(
                    'https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@2.0.0/dist/uv.sw.js',
                    { scope: '/uv/' }
                ).then(reg => {
                    console.log('Service Worker registered');
                }).catch(e => console.log('SW registration failed:', e));
            }
        });

        // Initialize with Google
        navigate('https://www.google.com');
    </script>
</body>
