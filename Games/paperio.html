  <div id="end-screen" class="hide" onclick="window._voodooExit()">   </div>
  <div id="retry-screen"></div>


    <script>


window._gameplay = {
  creative: {
    rendererBackgroundColor: '#eeeeee',
    invincibility: false,
    zoom: 3.1,
    backgroundColor: '#51a9e4',
    preview: true,
    previewSize: 1.7,
    shapeID: 3,
    randomizeShape: false,
    playerHasControls: true,
    minBotMovementRadius: 50,
    maxBotMovementRadius: 100,
    levelColor: '#cccccc',
    playersCount: 5,
    playersSpeed: 2,
    positionXPlayer0: 425,
    positionYPlayer0: 600,
    mainColorPlayer0: '#f39c12',
    secondColorPlayer0: '#f1c40f',
    positionXPlayer1: 650,
    positionYPlayer1: 800,
    mainColorPlayer1: '#16a085',
    secondColorPlayer1: '#1abc9c',
    positionXPlayer2: 190,
    positionYPlayer2: 180,
    mainColorPlayer2: '#2980b9',
    secondColorPlayer2: '#3498db',
    positionXPlayer3: 720,
    positionYPlayer3: 100,
    mainColorPlayer3: '#000000',
    secondColorPlayer3: '#000000',
    positionXPlayer4: 275,
    positionYPlayer4: 800,
    mainColorPlayer4: '#8E44AD',
    secondColorPlayer4: '#9B59B6'
  }
};
  window._gameplayEvents = window._gameplayEvents || {};

  window._gameplay.timerEndScreen = 5;
  window._gameplay.nbRetry = 4;
  window._gameplay.isEnd = false;
  window._gameplay.timerLock = false;
  window._gameplay.isInit = false;
  window._gameplay.paused = false;
  window._gameplay.nbClick = 0;
  window._gameplay.redirectionAfterClick = "8";

  window._gameplayEvents = {};

  window._gameplayEvents.startTimer = function(event){
    if(window._gameplay.timerLock) return;
    window._gameplay.timerLock = true;
    document.getElementById("start-screen").style.display = "none";
    window._gameplayEvents.startGame();
    setTimeout(function() {
       if (window._voodooProvider == 'tapjoy' && window.TJ_API) {
             window.TJ_API.objectiveComplete();
       }
       if(document.getElementById('retry-screen').style.display =="none" || document.getElementById('retry-screen').style.display=="")
          window._gameplayEvents.endGame("timer");
     }, window._gameplay.timerEndScreen*1000);
  };

  window._gameplayEvents.endGame = function(end){
    if(window._gameplay.isEnd) return;
    console.log("End Game : "+ end);
    window._gameplay.isEnd = true;
    window.showEndCard();
    if(end!="timer")
      window._gameplayEvents.fakeLevel();
    setTimeout(function(){
      document.getElementById('end-screen').style.display = "flex";
      document.getElementById('end-screen').classList.remove('hide');
      if (typeof window.showEndScreen === 'function') {
        window.showEndScreen();
      }
    },250);
  };

  window._gameplayEvents.fakeLevel = function(){
    if(true){
      window._gameplay.isFakeLevel = true;
      console.log("before : " + window._gameplay.creative.shapeID);
      window._gameplay.creative.shapeID = 1;
      console.log("after : " + window._gameplay.creative.shapeID);

      setTimeout(function(){

        window._gameplayEvents.startGame();
        window._gameplay.paused = false;
      },1*100)
    }

  };

  window._gameplayEvents.lose = function () {
    
    if(window._gameplay.nbRetry>0){
      if (typeof window.showRetryScreen === 'function') {
        setTimeout(function(){
          window.showRetryScreen();
        },300);

      }
    }else{
      window._gameplayEvents.endGame("lose");
    }
  }

  window._gameplayEvents.retry = function () {

    document.getElementById('retry-screen').style.display ="none";
    window._gameplay.nbRetry--;
    window._gameplayEvents.startGame();
  }


  window._gameplayEvents.exit = function(){
      window._gameplay.bannerClick = true;
      window._voodooExit();
      setTimeout(function() {
        window._gameplay.bannerClick = false;
      }, 500);
  }

  window._voodooIOS = "AppStore link";
  window._voodooANDROID = "Not available on Android";

  var lockClick = false;
  var storeRedirection = function(){
    if(lockClick)return;
    lockClick = true;
    console.log("click !!!!!");
    window._gameplay.nbClick ++;
    if(window._gameplay.nbClick >= window._gameplay.redirectionAfterClick ){
      window._voodooExit();
    }
    setTimeout(function(){
      lockClick = false;
    },250)
  }

  document.addEventListener('touchend',storeRedirection);
  document.addEventListener('touchcancel',storeRedirection);
  document.addEventListener('pointerup',storeRedirection);

  
  
  window.addEventListener('click',window._gameplayEvents.startTimer); window.addEventListener('touchstart',window._gameplayEvents.startTimer); window.addEventListener('pointerdown',window._gameplayEvents.startTimer);
  window.showEndScreen  = function(){   window.addEventListener("touchend",function(){       window._voodooExit()   });    window.addEventListener("touchcancel",function(){       window._voodooExit()   });    window.addEventListener("pointerup",function(){       window._voodooExit()   }); }
