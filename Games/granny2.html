<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <title>Unity WebGL Player | Granny 2</title>
    <link rel="shortcut icon" href="https://cdn.jsdelivr.net/gh/forms-docs-slides-glgl/ngng@main/TemplateData/favicon.ico"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/bubbls/ruffle@895d0224580381ddd003fc2ab72afead3cf134ad/john.css"/>
</head>
<body>
    <div id="unity-container" style="position: absolute; width: 100%; height: 100%; left: 0%; top: 0%;">
        <canvas id="unity-canvas" style="position: absolute; width: 100%; height: 100%"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
        <div id="unity-warning"></div>
    </div>

    <script>
        // Yandex SDK - safe init with fallback
        if (typeof YaGames !== 'undefined') {
            YaGames.init().then(ysdk => {
                console.log('Yandex SDK initialized');
                window.ysdk = ysdk;
                initPlayer();
            }).catch(err => console.warn('Yandex SDK init failed:', err));
        } else {
            console.warn('YaGames not available');
        }

        var player;
        function initPlayer() {
            if (!window.ysdk) return Promise.resolve(null);
            return ysdk.getPlayer({ scopes: false }).then(_player => {
                player = _player;
                return player;
            }).catch(err => {
                console.warn('Player init failed:', err);
                return null;
            });
        }
    </script>

    <script>
        var container = document.querySelector("#unity-container");
        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");
        var warningBanner = document.querySelector("#unity-warning");
        var myGameInstance = null; // FIXED: declared properly

        function unityShowBanner(msg, type) {
            function updateBannerVisibility() {
                warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
            }
            var div = document.createElement('div');
            div.innerHTML = msg;
            warningBanner.appendChild(div);
            if (type == 'error') {
                div.style = 'background: red; padding: 10px;';
            } else {
                if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
                setTimeout(function() {
                    if (div.parentNode) warningBanner.removeChild(div);
                    updateBannerVisibility();
                }, 5000);
            }
            updateBannerVisibility();
        }

        let environmentData = {
            language: "en",
            domain: "default_domain",
            deviceType: "desktop",
            isMobile: false,
            isDesktop: true,
            isTablet: false,
            isTV: false,
            appID: "default_app_id",
            browserLang: navigator.language || "en",
            payload: null,
            promptCanShow: false,
            reviewCanShow: false,
            platform: navigator.platform,
            browser: (function() {
                let userAgent = navigator.userAgent;
                if (userAgent.includes("YaBrowser")) return "Yandex";
                if (userAgent.includes("OPR") || userAgent.includes("Opera")) return "Opera";
                if (userAgent.includes("Firefox")) return "Firefox";
                if (userAgent.includes("MSIE") || userAgent.includes("Trident")) return "IE";
                if (userAgent.includes("Edge")) return "Edge";
                if (userAgent.includes("Chrome")) return "Chrome";
                if (userAgent.includes("Safari")) return "Safari";
                return "Other";
            })()
        };

        // FIXED: Replaced mergeFiles with a proper server-side merge approach
        // Unity WebGL needs HTTP range requests for .data files - blob URLs don't support this.
        // Instead, we use the single pre-merged files directly.
        async function initializeGame() {
            var buildUrl = "https://cdn.jsdelivr.net/gh/forms-docs-slides-glgl/ngng@main/Build";
            var loaderUrl = buildUrl + "/Granny 2.loader.js";

            loadingBar.style.display = "block";

            var config = {
                dataUrl: buildUrl + "/Granny 2.data",      // Use single merged .data file
                frameworkUrl: buildUrl + "/Granny 2.framework.js",  // FIXED: removed 'x'
                codeUrl: buildUrl + "/Granny 2.wasm",      // Use single merged .wasm file
                streamingAssetsUrl: "StreamingAssets",
                companyName: "Awesome",
                productName: "Granny 2",
                productVersion: "1.0",
                showBanner: unityShowBanner,
            };

            var script = document.createElement("script");
            script.src = loaderUrl;
            script.onload = () => {
                createUnityInstance(canvas, config, (progress) => {
                    progressBarFull.style.width = (100 * progress) + "%";
                }).then((unityInstance) => {
                    myGameInstance = unityInstance;
                    setTimeout(() => {
                        loadingBar.style.display = "none";
                    }, 500);
                }).catch((message) => {
                    alert("Failed to start game: " + message);
                    console.error(message);
                });
            };
            script.onerror = () => {
                alert("Failed to load game loader. Check your internet connection.");
                console.error("Failed to load:", loaderUrl);
            };
            document.body.appendChild(script);
        }

        initializeGame();
    </script>
</body>
</html>
