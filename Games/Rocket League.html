<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket League Embed</title>
    <style>
        /* Make the iframe fill the full viewport */
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe
        src="https://petezahgames.github.io/so/rocketleague/"
        title="Rocket League"
        allowfullscreen
        loading="lazy"
    ></iframe>
</body>
</html>
